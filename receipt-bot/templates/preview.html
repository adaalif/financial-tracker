<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Receipt — Financial Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/preview.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  {% set active_tab = 'scan' %}
  {% include 'navbar.html' %}

  <div class="container">
    <div class="card">
      <h1 class="font-display font-extrabold text-3xl mb-2 tracking-tight text-center text-carbon-black uppercase">Preview Data</h1>
      <p class="text-center mb-6" style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.875rem;">Review and confirm extracted expenses</p>

      <form action="/confirm" method="post" id="confirmForm">
        <input type="hidden" name="receipt_id" value="{{ receipt_id }}">

        <div class="form-row">
          <div class="form-group">
            <label for="merchant">Merchant</label>
            <input type="text" id="merchant" name="merchant" value="{{ data.merchant }}">
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="text" id="date" name="date" value="{{ data.date }}">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="currency">Currency</label>
            <input type="text" id="currency" name="currency" value="{{ data.currency }}" required>
          </div>
          <div class="form-group">
            <label for="total">Total Extracted</label>
            <input type="number" id="total" name="total" value="{{ data.total }}" step="0.01" required>
          </div>
        </div>

        <div class="items-section">
          <h3>Items</h3>
          <div id="itemsList">
            {% for item in data.items %}
            <div class="item-row">
              <input type="text" name="item_names" value="{{ item.name }}" placeholder="Item Name" required>
              <input type="number" name="item_prices" value="{{ item.price }}" step="0.01" placeholder="Price">
              <input type="text" name="item_categories" list="categories_data" value="{{ item.category }}" placeholder="Category">
            </div>
            {% endfor %}
            {% if not data.items %}
            <div class="item-row">
              <input type="text" name="item_names" placeholder="Item name">
              <input type="number" name="item_prices" step="0.01" placeholder="Price">
              <input type="text" name="item_categories" list="categories_data" placeholder="Category">
            </div>
            {% endif %}
          </div>
          <button type="button" class="btn btn-outline" id="addItemBtn" style="margin-top: 0.75rem;">
            + Add Item
          </button>
        </div>

        <div style="margin-top: 1.5rem; display: flex; gap: 0.75rem;">
          <a href="/scan" class="btn btn-outline" style="flex: 1;">← Back to Scan</a>
          <button type="submit" class="btn btn-success" style="flex: 2;">
            ✓ Confirm Receipt
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Hidden data source for the external JS to read category options from -->
  <datalist id="categories_data">
    {% for t in custom_tables %}
      <option value="{{ t }}">
    {% endfor %}
  </datalist>

  <script src="/static/js/preview.js"></script>
  <script src="/static/js/category-dropdown.js"></script>
</body>
</html>
