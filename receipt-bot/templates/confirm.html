<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Confirmed — Financial Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/confirm.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  {% set active_tab = 'dashboard' %}
  {% include 'navbar.html' %}

  <div class="container">
    <div class="card success-card" style="text-align: center; max-width: 400px; margin: 4rem auto;">
      <div style="font-size: 4rem; margin-bottom: 1rem;">🎉</div>
      <h2 style="margin-bottom: 0.5rem; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 2rem;">Success!</h2>
      <p style="color: var(--charcoal-brown); margin-bottom: 2rem;">Your expense has been recorded successfully.</p>

      <dl class="receipt-summary" style="text-align: left; background: var(--bg-input); padding: 1.5rem; border-radius: var(--radius-sm); margin-bottom: 2rem;">
        <dt style="font-weight: bold; margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Merchant</dt>
        <dd style="font-family: 'Space Mono', monospace; margin-bottom: 1rem; color: var(--carbon-black); font-weight: bold;">{{ data.merchant or "—" }}</dd>
        <dt style="font-weight: bold; margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Date</dt>
        <dd style="font-family: 'Space Mono', monospace; margin-bottom: 1rem; color: var(--carbon-black); font-weight: bold;">{{ data.date or "—" }}</dd>
        <dt style="font-weight: bold; margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Total</dt>
        <dd style="font-family: 'Space Mono', monospace; margin-bottom: 1rem; color: var(--carbon-black); font-weight: bold;">{{ data.currency }} {{ data.total }}</dd>
        <dt style="font-weight: bold; margin-top: 0.5rem; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Category</dt>
        <dd style="font-family: 'Space Mono', monospace; margin-bottom: 1rem; color: var(--carbon-black); font-weight: bold;">{{ data.category | capitalize }}</dd>
      </dl>

      <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
        <a href="/scan" class="btn btn-outline" style="flex: 1;">Scan Another</a>
        <a href="/" class="btn btn-primary" style="flex: 1;">Go to Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
