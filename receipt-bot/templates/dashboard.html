<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Financial Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Mono', 'monospace'],
            display: ['Bricolage Grotesque', 'sans-serif'],
          },
          colors: {
            brand: {
              white: '#fffcf2',
              grey: '#ccc5b9',
              brown: '#403d39',
              black: '#252422',
              orange: '#eb5e28'
            }
          }
        }
      }
    }
  </script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Chart.js for velocity splines without the React UMD bugs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #f8fafc; margin: 0; padding: 0; }
  </style>
</head>

<body class="bg-slate-50 m-0">
  {% set active_tab = 'dashboard' %}
  {% include 'navbar.html' %}
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // Secure Data Injection block directly from Jinja Backend mapped to React State
    const RAW_RECEIPTS = {{ receipts | default("[]") | tojson }};

    {% raw %}
    const IconWallet = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 6v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2Z"></path><path d="M22 13h-4"></path><path d="M18 10a3 3 0 0 0-3 3v0a3 3 0 0 0 3 3"></path></svg>;
    const IconArrowDownRight = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="7" x2="17" y2="17"></line><polyline points="17 7 17 17 7 17"></polyline></svg>;
    const IconMoreVertical = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>;
    const IconList = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;

    const DashboardUI = () => {
      const chartRef = useRef(null);
      const [chartInstance, setChartInstance] = useState(null);

      // Map Python Data into Frontend Analytics
      const totalDecimated = useMemo(() => {
        return RAW_RECEIPTS.reduce((acc, curr) => acc + (curr.total || 0), 0);
      }, []);

      // Calculate chart velocity data (grouping chronologically)
      const chartData = useMemo(() => {
        const dateMap = {};
        RAW_RECEIPTS.forEach(r => {
           if (!r.date) return;
           dateMap[r.date] = (dateMap[r.date] || 0) + (r.total || 0);
        });
        
        return Object.keys(dateMap).sort().map(date => ({
           date: date,
           amount: dateMap[date]
        }));
      }, []);

      // Mount Chart.js imperatively on the canvas
      useEffect(() => {
        if (!chartRef.current || chartData.length === 0) return;

        // Destroy previous to prevent React strict-mode double renders
        if (chartInstance) {
          chartInstance.destroy();
        }

        try {
          const newChart = new Chart(chartRef.current, {
            type: 'line',
            data: {
              labels: chartData.map(d => d.date),
              datasets: [{
                label: 'Spending Velocity',
                data: chartData.map(d => d.amount),
                borderColor: '#eb5e28',
                backgroundColor: '#fffcf2',
                borderWidth: 4,
                tension: 0.4, // Spline curve smoothing
                pointBackgroundColor: '#fffcf2',
                pointBorderColor: '#eb5e28',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#252422',
                  titleFont: { family: 'Space Mono', size: 12 },
                  bodyFont: { family: 'Space Mono', size: 14, weight: 'bold' },
                  padding: 12,
                  displayColors: false,
                  callbacks: {
                    label: function(context) {
                      return 'Rp ' + context.parsed.y.toLocaleString('id-ID');
                    }
                  }
                }
              },
              scales: {
                y: {
                  beginAtZero: true,
                  grid: { color: '#ccc5b9', drawBorder: false, borderDash: [3, 3] },
                  ticks: {
                    font: { family: 'Space Mono', size: 12 },
                    color: '#403d39',
                    callback: function(value) { return 'Rp ' + value.toLocaleString('id-ID'); }
                  },
                  border: { display: false }
                },
                x: {
                  grid: { display: false },
                  ticks: { font: { family: 'Space Mono', size: 12 }, color: '#403d39' },
                  border: { display: false }
                }
              }
            }
          });
          setChartInstance(newChart);
        } catch(e) {
          console.error("Chart.js failed to render safely: ", e);
        }

        return () => {
          if (newChart) newChart.destroy();
        };
      }, [chartData]); // eslint-disable-line react-hooks/exhaustive-deps

      // Organize top budgets
      const budgets = useMemo(() => {
        const catMap = {};
        RAW_RECEIPTS.forEach(r => {
           if (r.items && r.items.length > 0) {
              r.items.forEach(i => {
                 let cat = i.category || 'general';
                 catMap[cat] = (catMap[cat] || 0) + (i.price || 0);
              });
           }
        });
        
        return Object.keys(catMap).map(k => ({
           name: k.charAt(0).toUpperCase() + k.slice(1),
           spent: catMap[k],
           total: Math.max(500, Math.ceil(catMap[k] / 500) * 500),
           color: k.toLowerCase() === 'food' ? 'bg-brand-orange' : k.toLowerCase() === 'groceries' ? 'bg-purple-500' : 'bg-blue-500' 
        })).sort((a, b) => b.spent - a.spent).slice(0, 4);
      }, []);

      // Flatten items for recent transactions feed
      const transactions = useMemo(() => {
        let flattened = [];
        RAW_RECEIPTS.forEach(r => {
           if (r.items && r.items.length > 0) {
              r.items.forEach(i => flattened.push({...i, date: r.date, merchant: r.merchant, category: r.category}));
           } else {
              flattened.push({name: r.merchant || "Raw Scanned Receipt", price: r.total, date: r.date, category: r.category, merchant: r.merchant});
           }
        });
        return flattened.slice(0, 10).map((t, i) => ({...t, id: i}));
      }, []);

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-brand-black">
          <main className="max-w-6xl mx-auto px-6 py-8">
            <div className="flex items-center justify-between mb-8">
              <h1 className="font-display text-3xl font-extrabold tracking-tight text-brand-black uppercase">Financial Overview</h1>
              <select className="bg-white border-2 border-brand-black text-brand-black font-display font-bold uppercase text-sm rounded px-4 py-2 outline-none cursor-pointer hover:bg-slate-50 transition shadow-[2px_2px_0px_#252422]">
                <option>Last 30 Days</option>
                <option>All Time History</option>
              </select>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <div className="lg:col-span-2 space-y-8">
                
                <div className="bg-white p-6 md:p-8 rounded-xl border-2 border-brand-black flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-[6px_6px_0px_#eb5e28]">
                  <div>
                    <p className="text-xs font-bold text-brand-grey mb-1 uppercase tracking-widest font-display">Lifetime Tracked Spend</p>
                    <h2 className="font-display text-5xl font-extrabold tracking-tight text-brand-black">Rp {totalDecimated.toLocaleString('id-ID')}</h2>
                  </div>
                  
                  <div className="flex gap-3 w-full md:w-auto">
                    <div className="flex-1 md:flex-none p-4 rounded-lg bg-slate-50 border-2 border-slate-200 min-w-[140px]">
                      <div className="flex items-center gap-2 text-brand-orange mb-1">
                        <IconArrowDownRight />
                        <span className="text-xs font-bold uppercase tracking-wide font-display">Scanned Receipts</span>
                      </div>
                      <p className="font-display text-xl font-bold text-brand-black">{RAW_RECEIPTS.length}</p>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="font-display font-extrabold text-xl uppercase tracking-tight text-brand-black">Spending Flow</h3>
                    <a href="/history" className="text-brand-orange text-sm font-bold font-display uppercase hover:underline">Full History -&gt;</a>
                  </div>
                  <div className="h-64 w-full bg-slate-50 rounded-lg flex flex-col items-center justify-center border-2 border-dashed border-slate-300 mt-6 relative overflow-hidden">
                    {chartData.length > 0 ? (
                      <div className="w-full h-full p-4 pb-0">
                         <canvas ref={chartRef}></canvas>
                      </div>
                    ) : (
                      <div className="text-center absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-4xl mb-4 opacity-50 block">📈</span>
                        <p className="text-sm font-bold font-display uppercase tracking-widest text-brand-grey px-4">No velocity data to plot yet.</p>
                      </div>
                    )}
                  </div>
                </div>
                
              </div>

              <div className="space-y-8">
                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <h3 className="font-display font-extrabold text-xl uppercase tracking-tight text-brand-black mb-6">Top Categories Used</h3>
                  <div className="space-y-6">
                    {budgets.length > 0 ? budgets.map((budget, i) => (
                      <div key={i}>
                        <div className="flex justify-between text-sm mb-2">
                           <span className="font-bold text-brand-black uppercase font-display">{budget.name}</span>
                           <span className="text-brand-grey font-bold">Rp {budget.spent.toLocaleString('id-ID')}</span>
                        </div>
                        <div className="w-full bg-slate-100 rounded-full h-2">
                           <div 
                             className={`h-2 rounded-full ${budget.color}`} 
                             style={{ width: `${Math.min(100, (budget.spent / budget.total) * 100)}%` }}
                           ></div>
                        </div>
                      </div>
                    )) : <p className="text-sm font-bold text-brand-grey uppercase">No category metrics tracked yet.</p>}
                  </div>
                </div>

                <div className="bg-brand-white p-6 rounded-xl border-2 border-brand-black shadow-[4px_4px_0px_#ccc5b9] overflow-hidden">
                  <div className="flex justify-between items-center mb-6 border-b border-brand-black pb-4">
                     <h3 className="font-display font-extrabold text-xl uppercase tracking-tight text-brand-black">Recent Activity</h3>
                     <button className="text-brand-black hover:text-brand-orange bg-transparent"><IconMoreVertical /></button>
                  </div>
                  
                  <div className="space-y-4">
                    {transactions.map((tx) => (
                      <div key={tx.id} className="flex items-center justify-between p-2 hover:bg-white rounded-lg transition-colors border border-transparent hover:border-brand-black hover:shadow-[2px_2px_0px_#252422] -mx-2 cursor-pointer group">
                        <div className="flex items-center gap-3">
                           <div className="w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 border border-slate-300 group-hover:border-brand-orange text-brand-black">
                              <IconList />
                           </div>
                           <div>
                              <p className="font-bold text-sm truncate max-w-[140px] font-display">{tx.name}</p>
                              <p className="text-xs text-brand-brown break-all">{tx.merchant} • {tx.category}</p>
                           </div>
                        </div>
                        <p className="font-bold text-sm text-brand-orange">
                           Rp {typeof tx.price === 'number' ? tx.price.toLocaleString('id-ID') : parseFloat(tx.price || 0).toLocaleString('id-ID')}
                        </p>
                      </div>
                    ))}

                    {transactions.length === 0 && <p className="text-xs font-bold text-center text-brand-grey uppercase py-4">No receipts available.</p>}
                  </div>
                  
                  <a href="/history" className="block text-center w-full mt-6 py-3 text-sm font-extrabold text-brand-black uppercase tracking-wider font-display border-2 border-brand-black bg-white hover:bg-slate-50 transition-colors shadow-[2px_2px_0px_#252422]">
                    Explore Details
                  </a>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<DashboardUI />);
    {% endraw %}
  </script>
</body>
</html>
