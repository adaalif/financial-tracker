<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Expense — Financial Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/preview.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  {% set active_tab = 'history' %}
  {% include 'navbar.html' %}

  <div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <h1 class="font-display font-extrabold text-3xl mb-2 tracking-tight text-center text-carbon-black uppercase">Edit Item</h1>
      <p class="text-center mb-6" style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.875rem;">Modify existing expense details</p>

      <form action="/edit/{{ item.id }}" method="post" id="editForm">

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--charcoal-brown); margin-bottom: 0.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.25rem;">Receipt Details</h3>
          <div style="display: flex; gap: 1rem;">
            <div style="flex: 1;">
              <label for="merchant" style="font-size: 0.8rem;">Merchant</label>
              <input type="text" id="merchant" name="merchant" value="{{ item.transaction.merchant_name }}" style="padding: 0.5rem;">
            </div>
            <div style="flex: 1;">
              <label for="date" style="font-size: 0.8rem;">Date</label>
              <input type="date" id="date" name="date" value="{{ date_str }}" style="padding: 0.5rem;">
            </div>
            <div style="width: 80px;">
              <label for="currency" style="font-size: 0.8rem;">Currency</label>
              <input type="text" id="currency" name="currency" value="{{ item.transaction.currency }}" style="padding: 0.5rem;">
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <h3 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--charcoal-brown); margin-bottom: 0.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.25rem;">Item Details</h3>
          
          <label for="item_name" style="font-size: 0.8rem;">Name</label>
          <input type="text" id="item_name" name="item_name" value="{{ item.item_name }}" required style="margin-bottom: 0.75rem; padding: 0.5rem;">

          <div style="display: flex; gap: 1rem;">
            <div style="flex: 1;">
              <label for="item_price" style="font-size: 0.8rem;">Price</label>
              <input type="number" id="item_price" name="item_price" step="0.01" value="{{ price }}" required style="padding: 0.5rem;">
            </div>
            <div style="flex: 1;">
              <label for="category" style="font-size: 0.8rem;">Category</label>
              <input type="text" id="category" name="category" list="categories_list" value="{{ item.category.name if item.category else 'General' }}" style="padding: 0.5rem;">
            </div>
          </div>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 0.75rem;">
          <a href="/history" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
          <button type="submit" class="btn btn-success" style="flex: 2;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <datalist id="categories_list">
    {% for cat in categories %}
      <option value="{{ cat }}">
    {% endfor %}
  </datalist>

  <script src="/static/js/category-dropdown.js"></script>
</body>
</html>
